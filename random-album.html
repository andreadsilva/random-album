<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SHUFFLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222;
    --accent: #c8f55a;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #555;
    --radius: 4px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 1000;
  }

  /* Header */
  header {
    padding: 20px 24px 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
  }

  .status-pill {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-pill.connected .dot { background: var(--accent); }

  /* Main content */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
    position: relative;
  }

  /* Album art area */
  .album-container {
    width: 100%;
    max-width: 340px;
    position: relative;
  }

  .album-frame {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  /* Corner markers */
  .album-frame::before, .album-frame::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 2;
  }
  .album-frame::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .album-frame::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  .album-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .album-art.loaded { opacity: 1; }

  .album-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .placeholder-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    width: 80px;
    opacity: 0.15;
  }
  .placeholder-grid span {
    aspect-ratio: 1;
    background: var(--text);
    display: block;
  }
  .placeholder-grid span:nth-child(odd) { background: var(--muted); }

  .placeholder-text {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Scanning animation */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0;
    opacity: 0;
    pointer-events: none;
  }
  .scanning .scan-line {
    opacity: 1;
    animation: scan 0.6s ease-in-out infinite alternate;
  }
  @keyframes scan {
    from { top: 0%; }
    to   { top: 100%; }
  }

  /* Album info */
  .album-info {
    width: 100%;
    max-width: 340px;
    margin-top: 20px;
    min-height: 80px;
  }

  .album-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    line-height: 1.1;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s 0.1s ease, transform 0.4s 0.1s ease;
  }
  .album-title.visible { opacity: 1; transform: translateY(0); }

  .album-artist {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s 0.2s ease, transform 0.4s 0.2s ease;
  }
  .album-artist.visible { opacity: 1; transform: translateY(0); }

  .album-meta {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.4s 0.3s ease;
  }
  .album-meta.visible { opacity: 1; }

  /* Buttons */
  .actions {
    width: 100%;
    max-width: 340px;
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.2s ease;
    z-index: 0;
  }
  .btn span { position: relative; z-index: 1; }

  .btn:active::before, .btn.primary::before { transform: translateX(0); }
  .btn:active span, .btn.primary span { color: #0a0a0a; }

  .btn.primary {
    border-color: var(--accent);
    background: var(--accent);
    color: #0a0a0a;
    font-weight: 500;
  }
  .btn.primary::before { background: #e8ff7a; }

  .btn.open-spotify {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.open-spotify::before { background: var(--accent); }
  .btn.open-spotify:active span { color: #0a0a0a; }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Auth screen */
  #auth-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
    gap: 32px;
  }

  .auth-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 8px;
    color: var(--accent);
    line-height: 0.9;
  }

  .auth-sub {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.8;
  }

  .auth-divider {
    width: 40px;
    height: 1px;
    background: var(--border);
  }

  /* Counter bar */
  .counter-bar {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .counter-text {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .counter-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .logout-btn:hover { color: var(--accent2); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 80px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div>
    <div class="auth-title">SHUF<br>FLE</div>
  </div>
  <div class="auth-divider"></div>
  <p class="auth-sub">Random albums<br>from your Spotify library</p>
  <button class="btn primary" onclick="login()"><span>Connect Spotify</span></button>
</div>

<!-- App Screen -->
<div id="app-screen" class="hidden" style="display:flex;flex-direction:column;height:100dvh;">

  <header>
    <div class="logo">SHUFFLE</div>
    <div class="status-pill connected" id="status-pill">
      <span class="dot"></span>
      <span id="status-text">Connected</span>
    </div>
  </header>

  <main>
    <div class="album-container">
      <div class="album-frame" id="album-frame">
        <div class="scan-line" id="scan-line"></div>
        <img class="album-art" id="album-art" src="" alt="Album art" onload="this.classList.add('loaded')">
        <div class="album-placeholder" id="placeholder">
          <div class="placeholder-grid">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="placeholder-text">Tap to discover</div>
        </div>
      </div>
    </div>

    <div class="album-info">
      <div class="album-title" id="album-title">—</div>
      <div class="album-artist" id="album-artist">—</div>
      <div class="album-meta" id="album-meta"></div>
    </div>

    <div class="actions">
      <button class="btn primary" id="shuffle-btn" onclick="pickRandom()">
        <span>↻ &nbsp; Shuffle</span>
      </button>
      <button class="btn open-spotify hidden" id="open-btn" onclick="openInSpotify()">
        <span>Open in Spotify</span>
      </button>
    </div>
  </main>

  <div class="counter-bar">
    <div>
      <div class="counter-text">Library</div>
      <div class="counter-num" id="album-count">—</div>
    </div>
    <button class="logout-btn" onclick="logout()">Disconnect</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = 'a4e5cc56c5c74ee18021c7f41b72a634';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
const SCOPES = 'user-library-read';

let albums = [];
let currentAlbum = null;
let accessToken = null;

// ─── Auth ─────────────────────────────────────────────────────────────────────

function login() {
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('oauth_state', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'token',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    state,
    show_dialog: 'false'
  });
  window.location = `https://accounts.spotify.com/authorize?${params}`;
}

function logout() {
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_token_expiry');
  localStorage.removeItem('spotify_albums');
  albums = [];
  currentAlbum = null;
  accessToken = null;
  showScreen('auth');
}

function getStoredToken() {
  const token = localStorage.getItem('spotify_token');
  const expiry = localStorage.getItem('spotify_token_expiry');
  if (token && expiry && Date.now() < parseInt(expiry)) return token;
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_token_expiry');
  return null;
}

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  // Check for token in URL hash (after OAuth redirect)
  const hash = window.location.hash.substring(1);
  if (hash) {
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    const expiresIn = params.get('expires_in');
    if (token) {
      localStorage.setItem('spotify_token', token);
      localStorage.setItem('spotify_token_expiry', Date.now() + parseInt(expiresIn) * 1000);
      window.history.replaceState({}, '', window.location.pathname);
    }
  }

  accessToken = getStoredToken();
  if (!accessToken) {
    showScreen('auth');
    return;
  }

  showScreen('app');
  await loadAlbums();
}

// ─── Albums ───────────────────────────────────────────────────────────────────

async function loadAlbums() {
  setStatus('Loading…');

  // Check cache (refreshes every 24h)
  const cached = localStorage.getItem('spotify_albums');
  const cachedTime = localStorage.getItem('spotify_albums_time');
  if (cached && cachedTime && Date.now() - parseInt(cachedTime) < 86400000) {
    albums = JSON.parse(cached);
    setStatus('Connected');
    document.getElementById('album-count').textContent = albums.length;
    return;
  }

  try {
    albums = await fetchAllAlbums();
    localStorage.setItem('spotify_albums', JSON.stringify(albums));
    localStorage.setItem('spotify_albums_time', Date.now());
    document.getElementById('album-count').textContent = albums.length;
    setStatus('Connected');
  } catch (e) {
    if (e.message === '401') { logout(); return; }
    showToast('Failed to load library');
    setStatus('Error');
  }
}

async function fetchAllAlbums() {
  let url = 'https://api.spotify.com/v1/me/albums?limit=50';
  const all = [];

  while (url) {
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    if (!res.ok) throw new Error(String(res.status));
    const data = await res.json();
    data.items.forEach(item => {
      all.push({
        id: item.album.id,
        name: item.album.name,
        artist: item.album.artists.map(a => a.name).join(', '),
        year: item.album.release_date?.slice(0, 4),
        tracks: item.album.total_tracks,
        art: item.album.images[0]?.url,
        uri: item.album.uri,
        url: item.album.external_urls.spotify
      });
    });
    url = data.next;
  }

  return all;
}

// ─── Shuffle ──────────────────────────────────────────────────────────────────

async function pickRandom() {
  if (!albums.length) {
    await loadAlbums();
    if (!albums.length) return;
  }

  // Scanning animation
  const frame = document.getElementById('album-frame');
  frame.classList.add('scanning');

  // Hide old info
  document.getElementById('album-title').classList.remove('visible');
  document.getElementById('album-artist').classList.remove('visible');
  document.getElementById('album-meta').classList.remove('visible');
  document.getElementById('open-btn').classList.add('hidden');
  document.getElementById('shuffle-btn').disabled = true;

  await sleep(500);

  const pick = albums[Math.floor(Math.random() * albums.length)];
  currentAlbum = pick;

  // Load art
  const img = document.getElementById('album-art');
  img.classList.remove('loaded');
  document.getElementById('placeholder').style.display = 'none';

  if (pick.art) {
    img.src = pick.art;
  }

  frame.classList.remove('scanning');

  // Show info
  document.getElementById('album-title').textContent = pick.name;
  document.getElementById('album-artist').textContent = pick.artist;
  document.getElementById('album-meta').textContent =
    [pick.year, pick.tracks ? `${pick.tracks} tracks` : null].filter(Boolean).join(' · ');

  await sleep(50);
  document.getElementById('album-title').classList.add('visible');
  document.getElementById('album-artist').classList.add('visible');
  document.getElementById('album-meta').classList.add('visible');
  document.getElementById('open-btn').classList.remove('hidden');
  document.getElementById('shuffle-btn').disabled = false;
}

function openInSpotify() {
  if (!currentAlbum) return;
  // Try app URI first, fall back to web URL
  window.location = currentAlbum.uri;
  setTimeout(() => { window.open(currentAlbum.url, '_blank'); }, 500);
}

// ─── Utils ────────────────────────────────────────────────────────────────────

function showScreen(name) {
  document.getElementById('auth-screen').classList.toggle('hidden', name !== 'auth');
  document.getElementById('app-screen').classList.toggle('hidden', name !== 'app');
  if (name === 'app') document.getElementById('app-screen').style.display = 'flex';
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
  const pill = document.getElementById('status-pill');
  pill.classList.toggle('connected', text === 'Connected');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
